<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Builder</title>
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/layout-tokens.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/layout/grid-layout.css">
  <link rel="stylesheet" href="css/layout/responsive.css">
  <link rel="stylesheet" href="css/components/map.css">
  <link rel="stylesheet" href="css/components/sidebar.css">
  <link rel="stylesheet" href="css/components/resources.css">
  <link rel="stylesheet" href="css/components/build-menu.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/building-info-modal.css">
  <link rel="stylesheet" href="css/components/notifications.css">
  <link rel="stylesheet" href="css/components/weather-widget.css">
  <link rel="stylesheet" href="css/components/news-panel.css">
  <link rel="stylesheet" href="css/components/citizen-panel.css">
  <link rel="stylesheet" href="css/components/score-panel.css">
  <link rel="stylesheet" href="css/components/chart-panel.css">
  <link rel="stylesheet" href="css/components/ranking-modal.css">
</head>

<body>
  <header id="top-bar">
    <span id="city-name"></span>
    <span id="turn-display"></span>
    <span id="score-display"></span>
    <button id="btn-toggle-sidebars" type="button" aria-controls="left-sidebar right-sidebar" aria-label="Alternar paneles">☰</button>
    <button id="btn-hacks" type="button" aria-controls="hacks-modal" aria-label="Editar recursos">Hacks</button>
    <span class="top-sep"></span>
    <button id="btn-new-city">Nueva Ciudad</button>
    <button id="btn-save">Guardar</button>
    <button id="btn-route" title="Selecciona 2 edificios para calcular la ruta (F)">🗺️ Ruta</button>
    <button id="btn-ranking">Ranking</button>
    <button id="btn-export">Exportar</button>
    <button id="btn-import">Importar</button>
  </header>

  <div id="sidebar-overlay" aria-hidden="true"></div>

  <main>
    <div id="game-layout">

      <!-- ══ SIDEBAR IZQUIERDO ══ -->
      <aside id="left-sidebar" class="open">

        <!-- Recursos -->
        <div class="sidebar-section-header">Recursos</div>
        <section id="resource-panel"></section>

        <!-- Ciudadanos -->
        <div class="sidebar-section-header">Ciudadanos</div>
        <section id="citizen-panel"></section>

        <!-- Construcción -->
        <div class="sidebar-section-header">Construir</div>
        <section id="build-menu"></section>

      </aside>

      <!-- ══ MAPA ══ -->
      <section id="map-container">
        <div id="map-grid"></div>
        <div id="notifications-container"></div>
      </section>

      <!-- ══ SIDEBAR DERECHO ══ -->
      <aside id="right-sidebar">

        <!-- Clima -->
        <div class="sidebar-section-header">Clima</div>
        <section id="weather-widget"></section>
        <template id="weather-template">
          <div class="weather-main">
            <img class="weather-icon" alt="" loading="lazy">
            <span class="weather-temp"></span>
          </div>
          <div class="weather-condition"></div>
          <div class="weather-details">
            <div class="weather-detail-item">
              <span class="weather-detail-label">💧 Humedad</span>
              <span class="weather-detail-value" data-field="humidity"></span>
            </div>
            <div class="weather-detail-item">
              <span class="weather-detail-label">💨 Viento</span>
              <span class="weather-detail-value" data-field="windSpeed"></span>
            </div>
          </div>
        </template>

        <!-- Noticias -->
        <div class="sidebar-section-header">Noticias</div>
        <section id="news-panel"></section>

        <!-- Puntuación -->
        <div class="sidebar-section-header">Puntuación</div>
        <section id="score-panel"></section>

        <!-- Gráficas -->
        <div class="sidebar-section-header">Economía</div>
        <section id="chart-panel"></section>

      </aside>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay modal--hidden"></div>

  <div id="hacks-modal" class="modal modal--hidden" role="dialog" aria-modal="true">
    <div class="modal__header">
      <span>Hacks</span>
      <button class="modal__close" id="hacks-close-btn">&times;</button>
    </div>
    <div class="modal__body">
      <p class="hacks-help">Ajusta recursos y consumo. Los cambios se aplican al momento.</p>
      <section id="resource-config" aria-hidden="true">
        <label class="hacks-field">
          <span>Turno (segundos)</span>
          <input type="number" id="turn-duration" value="10" min="1" max="60">
        </label>
        <label class="hacks-field">
          <span>Dinero inicial</span>
          <input type="number" id="init-money" value="50000">
        </label>
        <button id="btn-set-money" class="btn-primary" type="button">Aplicar dinero</button>
        <label class="hacks-field">
          <span>Electricidad inicial</span>
          <input type="number" id="init-electricity" value="0">
        </label>
        <label class="hacks-field">
          <span>Agua inicial</span>
          <input type="number" id="init-water" value="0">
        </label>
        <label class="hacks-field">
          <span>Alimentos inicial</span>
          <input type="number" id="init-food" value="0">
        </label>
        <label class="hacks-field">
          <span>Consumo agua por ciudadano</span>
          <input type="number" id="citizen-water" value="1">
        </label>
        <label class="hacks-field">
          <span>Consumo electricidad por ciudadano</span>
          <input type="number" id="citizen-elec" value="1">
        </label>
        <label class="hacks-field">
          <span>Consumo alimentos por ciudadano</span>
          <input type="number" id="citizen-food" value="1">
        </label>
        <label class="hacks-field">
          <span>Bonus policia</span>
          <input type="number" id="bonus-police" value="10">
        </label>
        <label class="hacks-field">
          <span>Bonus bomberos</span>
          <input type="number" id="bonus-fire" value="10">
        </label>
        <label class="hacks-field">
          <span>Bonus hospital</span>
          <input type="number" id="bonus-hospital" value="10">
        </label>
      </section>
    </div>
    <div class="modal__footer">
      <button class="btn-primary" id="hacks-apply" type="button">Aplicar cambios</button>
      <button class="btn-primary" id="hacks-close-footer" type="button">Cerrar</button>
    </div>
  </div>

  <div id="building-info-modal" class="modal modal--hidden"></div>
  <div id="ranking-modal" class="modal modal--hidden"></div>

  <footer id="bottom-bar">
    <span id="turn-info"></span>
    <span id="mode-display"></span>
    <span>[B: construir]</span>
    <span>[R: vías]</span>
    <span>[D: demoler]</span>
    <span>[F: ruta]</span>
    <span>[ESC: cancelar]</span>
    <span>[Space: pausa]</span>
    <span>[S: guardar]</span>
    <span>[Click derecho: info]</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>

</html>
