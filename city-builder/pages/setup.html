<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurar Ciudad | City Builder</title>
    <link rel="stylesheet" href="../css/base/reset.css" />
    <link rel="stylesheet" href="../css/base/variables.css" />
    <link rel="stylesheet" href="../css/pages/setup.css" />
    <link rel="stylesheet" href="../css/components/notifications.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Rajdhani:700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Source+Sans+3:400,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=JetBrains+Mono:400,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="setup-container">
      <section class="setup-shell">
        <header class="setup-header">
          <p class="setup-kicker">City Builder</p>
          <h1>Crear nueva ciudad</h1>
          <p class="setup-subtitle">Configura tu ciudad, elige la region y define el mapa.</p>
        </header>
        <form id="setup-form" class="setup-form" autocomplete="off">
          <div class="field-block">
          <label for="city-name">Nombre de la ciudad</label>
          <input
            id="city-name"
            name="city-name"
            type="text"
            maxlength="50"
            required
          />
          </div>
          <div class="field-block">
          <label for="mayor-name">Nombre del alcalde</label>
          <input
            id="mayor-name"
            name="mayor-name"
            type="text"
            maxlength="50"
            required
          />
          </div>
          <div class="field-block">
          <label for="region-search">Buscar ciudad colombiana</label>
          <input
            id="region-search"
            name="region-search"
            type="text"
            placeholder="Ej: Bogotá"
          />
          <ul id="region-results" class="region-results-dropdown"></ul>
        </div>
        <div class="field-block">
          <label for="region-select">Ciudad seleccionada</label>
          <select id="region-select" name="region-select"></select>
        </div>
        <div class="field-block split-fields">
          <label>Latitud</label>
          <input id="lat-display" type="text" readonly />
          <label>Longitud</label>
          <input id="lon-display" type="text" readonly />
        </div>
        <div class="field-block">
          <label>Mapa de la ciudad</label>
          <div id="map-load-section">
            <p class="map-load-description">
              Opcional: carga un archivo <code>.txt</code> con el diseño del
              mapa. Si no cargas uno, se generará un terreno vacío. Archivo de
              ejemplo: <code>assets/maps/example-map.txt</code>
            </p>
            <button type="button" id="btn-load-map">
              📂 Cargar mapa desde .txt
            </button>
            <input id="map-file-input" type="file" accept=".txt" hidden />
            <div id="map-preview" class="map-preview-container"></div>
          </div>
        </div>
        <div class="field-block">
          <label>Tamaño del mapa (si no cargas archivo)</label>
          <div class="map-size-inputs">
            <div>
              <label for="map-width" class="map-size-label">Ancho</label>
              <input
                id="map-width"
                name="map-width"
                type="number"
                min="15"
                max="30"
                value="20"
              />
            </div>
            <div>
              <label for="map-height" class="map-size-label">Alto</label>
              <input
                id="map-height"
                name="map-height"
                type="number"
                min="15"
                max="30"
                value="20"
              />
            </div>
          </div>
        </div>
        <div id="setup-errors" class="setup-error"></div>
        <div class="form-actions">
          <button type="submit" id="btn-create-city" class="button-primary">Crear ciudad</button>
          <button id="btn-continue" class="btn-continue-hidden" type="button">Continuar partida guardada</button>
        </div>
      </form>
      </section>
    </main>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
